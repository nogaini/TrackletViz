# ─────────────────────────────────────────────────────────────
#  TrackletViz Default Configuration
# ─────────────────────────────────────────────────────────────

# ── Detection & Tracking ──────────────────────────────────────
processing:
  yolo_model: yolo11n.pt # YOLO model variant (n/s/m/l/x)
  tracker: botsort # BoxMOT tracker type
  confidence_threshold: 0.3 # Minimum detection confidence
  # COCO class IDs to track:
  #   0=person, 1=bicycle, 2=car, 3=motorcycle, 5=bus, 7=truck
  target_classes: [0, 1, 2, 3, 5, 7]
  min_tracklet_frames: 16 # Minimum frames for a valid tracklet
  device: cuda # 'cuda' or 'cpu'

# ── VideoPrism Embeddings ─────────────────────────────────────
videoprism:
  model_path: ../videoprism # Path to cloned VideoPrism repo (added to sys.path)
  model_name: videoprism_lvt_public_v1_base # LvT model supports video + text
  batch_size: 4 # Tracklets processed per batch
  device: cuda
  num_frames: 16 # Frames sampled per tracklet clip

# ── Clustering & Dimensionality Reduction ─────────────────────
clustering:
  umap:
    n_neighbors: 15
    min_dist: 0.1
    metric: cosine
    n_components: 2 # Output dimensionality (always 2 for viz)
    random_state: 42
  hdbscan:
    min_cluster_size: 15
    min_samples: 3 # Controls noise sensitivity
    metric: euclidean # Applied on original high-dim embeddings
    cluster_selection_method: eom
  fps_representatives: 5 # Number of FPS representatives per cluster

# ── Qdrant Vector Database ────────────────────────────────────
qdrant:
  host: localhost
  port: 6333
  tracklets_collection: tracklets
  videos_collection: videos
  vector_dim: 768 # VideoPrism LvT base embedding dimension

# ── Thumbnail Generation ──────────────────────────────────────
thumbnails:
  width: 128
  height: 128
  format: jpeg
  quality: 85
  padding: 8 # Pixel padding around bounding box crop
